version: 2
updates:
  - package-ecosystem: npm
    directories:
      - /
      - /**/*
    schedule:
      interval: weekly
      day: monday
      time: !!str 08:00
      timezone: Australia/Melbourne
    groups:
      npm-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: !!str 08:00
      timezone: Australia/Melbourne
    groups:
      gh-actions:
        patterns:
          - "*"
    cooldown:
      default-days: 7
